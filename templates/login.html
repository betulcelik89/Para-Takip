<!DOCTYPE html>
<html>
<head>
    <title>Giriş Yap - ParaTakip</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold mb-6 text-center text-indigo-600">Giriş Yap</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Kullanıcı Adı" class="w-full p-4 mb-4 bg-slate-100 rounded-2xl outline-none" required>
            <input type="password" name="password" placeholder="Şifre" class="w-full p-4 mb-6 bg-slate-100 rounded-2xl outline-none" required>
            <button class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">Giriş Yap</button>
        </form>
        <p class="mt-6 text-center text-gray-500">Hesabın yok mu? <a href="/register" class="text-indigo-600 font-bold">Kayıt Ol</a></p>
    </div>
</body>
</html>
